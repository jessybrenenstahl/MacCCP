name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install playback dependencies
        run: brew install mpv

      - name: Test
        run: swift test

      - name: Validate production signing secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MACCCP_CODESIGN_IDENTITY: ${{ secrets.MACCCP_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          missing=0
          for name in BUILD_CERTIFICATE_BASE64 P12_PASSWORD KEYCHAIN_PASSWORD MACCCP_CODESIGN_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name is required for a production MacCCP release"
              missing=1
            fi
          done
          exit "$missing"

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/macccp-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/macccp-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build DMG
        env:
          MACCCP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
          MACCCP_CODESIGN_IDENTITY: ${{ secrets.MACCCP_CODESIGN_IDENTITY }}
          MACCCP_REQUIRE_NOTARIZATION: "1"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          VERSION="${MACCCP_VERSION#v}"
          MACCCP_VERSION="$VERSION" scripts/package_dmg.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: MacCCP-DMG
          path: |
            dist/MacCCP-*.dmg
            dist/MacCCP-*.dmg.sha256

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "MacCCP ${GITHUB_REF_NAME}" \
              --notes "Native macOS release with bundled libmpv/FFmpeg playback. Developer ID signed, notarized, and stapled."

          gh release upload "${GITHUB_REF_NAME}" \
            dist/MacCCP-*.dmg \
            dist/MacCCP-*.dmg.sha256 \
            --clobber
